episodes:
  - 自家用車は家族の変化に合わせて7年で7回乗り換え、行き着いた先は電気自動車。その勢いで九州のEVコミュニティ「MARK EV」を共同主催し、毎月九州各地でイベントを開催しています。
  - 学生時代はPCオンラインゲームに熱中し、複数タイトルで個人ランキング1位、100名規模のクランマスターも経験。「ルールと仕組みを組み合わせて最大の成果を出す」楽しさが、情シスというキャリアの原点に。
  - ガジェットもキャンプ道具も、「より良い状態」を探し続けるうちに増え続けるのが性分。
