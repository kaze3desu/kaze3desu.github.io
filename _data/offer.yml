career_change:
  word: 「現在は転職を考えておりません。」
side_work:
  word: 「お仕事のご依頼があればお気軽にご相談ください。」
  sub: 現在複数社と契約中のため、新規のご依頼はお断りする場合があります。
conditions:
  - k: 支援内容 / Services
    v: コーポレートIT業務全般の支援
    note: コンサルティング・顧問 ／ スポットコンサル
  - k: 勤務形態 / Work Style
    v: フルリモートワーク
    note: 自宅からのフルリモートワークが基本です。オフィスへの出張も相談に応じます。
  - k: 稼働時間 / Hours
    v: 平日夜間・土日祝日
    note: 主に平日夜間や土日祝日の稼働を想定しています。日中の稼働も相談に応じます。
  - k: 報酬 / Compensation
    v: 月額定額制 または 時給制
    note: 時給は6,000円〜（税別）。月額は稼働内容に応じてご相談ください。
  - k: 契約形態 / Contract
    v: 準委任契約
    note: 契約形態は履行割合型の準委任契約です。
