- title: アプリ開発の全工程を経験
  desc: 5年間にわたり、FileMakerを活用したアプリ開発を担当。要件定義から設計、開発、運用・保守までを一貫して担い、業務効率化やシステム最適化を実現。リレーショナルデータベースやREST APIに関する知見。
- title: 本質を見極める問題解決力
  desc: 物事を俯瞰的に捉え、感情に流されることなく冷静に分析する力を持つ。課題の本質を見極め、最適な解決策を提案・実行できる。
- title: 未知の分野でも徹底的に調査し、成果につなげる力
  desc: 常に効率化を意識し、新しい技術や分野に対しても積極的に学習。徹底的にリサーチし、最適な手法を導き出すことを得意とする。
- title: 円滑なコミュニケーションスキル
  desc: 対面はもちろん、フルリモート環境やテキストコミュニケーションにおいても、的確かつスムーズな意思疎通が可能。多様なメンバーと協働し、円滑なプロジェクト推進を実現。
- title: 伝わるドキュメント作成力
  desc: 読み手の視点を意識し、複雑な情報をわかりやすく整理・構造化して伝えることが得意。ナレッジ共有や業務マニュアル作成を通じて、組織の生産性向上に貢献。
